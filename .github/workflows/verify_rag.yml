name: AgenticOps Ragas Evaluation Gate

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  evaluate-rag:
    name: Run Ragas Automated Quality Check
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4

      - name: Set up Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install System and Python Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            # Verbose installation to confirm the modules download successfully
            python -m pip install -r requirements.txt
          else
            echo "Error: requirements.txt not found in root!"
            exit 1
          fi

      - name: Run Ragas Quality Gate Verification
        env:
          # Pulls secure keys from your GitHub Secrets vault
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ELASTIC_ENDPOINT: ${{ secrets.ELASTIC_ENDPOINT }}
          
          # Connects live executions directly to your LangSmith Dashboard
          LANGCHAIN_API_KEY: ${{ secrets.LANGCHAIN_API_KEY }}
          LANGCHAIN_TRACING_V2: "true"
          LANGCHAIN_PROJECT: "AgenticOps"
        run: |
          # Use 'python -m pytest' to bypass binary path-resolution blocks
          python -m pytest backend/tests/ -v